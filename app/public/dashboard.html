<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body onload="loadDashboard()">
    <div class="card dashboard-card">
        <img class="avatar" src="https://picsum.photos/200?random=5" alt="avatar">
        <h1 id="welcomeUser">Loading...</h1>
        <p class="subtitle">You are logged in securely.</p>
        <button onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
